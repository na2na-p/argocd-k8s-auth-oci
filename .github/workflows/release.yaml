name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Tag, Release, Build and Push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0

      - name: Generate CalVer tag
        id: calver
        run: |
          DATE=$(date -u +%Y.%m.%d)
          BASE_TAG="v${DATE}"
          # Check if base tag exists
          if git tag -l "${BASE_TAG}" | grep -q .; then
            # Find the highest suffix for today
            LATEST=$(git tag -l "${BASE_TAG}.*" | sort -t. -k4 -n | tail -1)
            if [ -z "$LATEST" ]; then
              TAG="${BASE_TAG}.2"
            else
              NUM=$(echo "$LATEST" | awk -F. '{print $NF}')
              TAG="${BASE_TAG}.$((NUM + 1))"
            fi
          else
            TAG="${BASE_TAG}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        run: |
          git tag "${{ steps.calver.outputs.tag }}"
          git push origin "${{ steps.calver.outputs.tag }}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.calver.outputs.tag }}" \
            --title "${{ steps.calver.outputs.tag }}" \
            --generate-notes

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version: "1.26.1"
          cache: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4

      - name: Login to GHCR
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/na2na-p/argocd-k8s-auth-oci:${{ steps.calver.outputs.version }}
            ghcr.io/na2na-p/argocd-k8s-auth-oci:latest
          build-args: |
            VERSION=${{ steps.calver.outputs.version }}
            COMMIT=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
