name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Tag, Release, Build and Push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Generate CalVer tag
        id: calver
        run: |
          DATE=$(date -u +%Y.%m.%d)
          BASE_TAG="v${DATE}"
          # Check if base tag exists
          if git tag -l "${BASE_TAG}" | grep -q .; then
            # Find the highest suffix for today
            LATEST=$(git tag -l "${BASE_TAG}.*" | sort -t. -k4 -n | tail -1)
            if [ -z "$LATEST" ]; then
              TAG="${BASE_TAG}.2"
            else
              NUM=$(echo "$LATEST" | awk -F. '{print $NF}')
              TAG="${BASE_TAG}.$((NUM + 1))"
            fi
          else
            TAG="${BASE_TAG}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        run: |
          git tag "${{ steps.calver.outputs.tag }}"
          git push origin "${{ steps.calver.outputs.tag }}"

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.calver.outputs.tag }}" \
            --title "${{ steps.calver.outputs.tag }}" \
            --generate-notes

      - name: Setup Go
        uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.26.1"
          cache: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Login to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/na2na-p/argocd-k8s-auth-oci:${{ steps.calver.outputs.version }}
            ghcr.io/na2na-p/argocd-k8s-auth-oci:latest
          build-args: |
            VERSION=${{ steps.calver.outputs.version }}
            COMMIT=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
