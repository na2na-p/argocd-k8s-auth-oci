name: "CI for any PR"

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - reopened
      - synchronize
      - ready_for_review

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      go: ${{ steps.changes.outputs.go }}
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Detect changes
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4
        id: changes
        with:
          filters: |
            go:
              - '**.go'
              - 'go.mod'
              - 'go.sum'
              - '.golangci.yaml'
              - '.github/workflows/go-ci.yml'
              - 'Dockerfile'

  go-ci:
    if: needs.detect-changes.outputs.go == 'true'
    needs: detect-changes
    uses: ./.github/workflows/go-ci.yml

  ci-summary:
    runs-on: ubuntu-latest
    needs: [detect-changes, go-ci]
    if: always()
    steps:
      - name: Check CI results
        run: |
          echo "=== CI Summary ==="
          echo "Changes detected:"
          echo "  go: ${{ needs.detect-changes.outputs.go }}"
          echo ""
          echo "Job Results:"
          if [ "${{ needs.detect-changes.outputs.go }}" == "true" ]; then
            echo "  go-ci: ${{ needs.go-ci.result }}"
          else
            echo "  go-ci: skipped (no changes)"
          fi

          OVERALL_STATUS="success"
          if [[ "${{ needs.detect-changes.outputs.go }}" == "true" && "${{ needs.go-ci.result }}" != "success" ]]; then
            OVERALL_STATUS="failure"
          fi

          if [[ "$OVERALL_STATUS" == "failure" ]]; then
            echo -e "\n\033[0;31mOne or more jobs failed.\033[0m"
            exit 1
          else
            echo -e "\n\033[0;32mAll relevant jobs passed successfully.\033[0m"
          fi
